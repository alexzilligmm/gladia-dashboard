<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GLADIA · HPC Console</title>
<link rel="icon" href="https://gladia.di.uniroma1.it/media/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Roman / Sapienza academic palette */
    --paper: #f6f1e6;
    --card:  #ffffff;
    --card-alt: #faf6ea;
    --ink:   #1c1a16;
    --ink-soft: #4a443c;
    --ink-muted: #8a8478;
    --ink-faint: #c0b9a8;
    --rule:  #ddd2b8;
    --rule-soft: #ebe3ce;
    --crimson: #8a1f1f;     /* Sapienza red */
    --crimson-soft: rgba(138,31,31,0.08);
    --navy:    #1d3a5c;
    --you:     #2a5a8a;
    --gold:    #9c7a2c;
    --good:    #5a7f3e;
    --warn:    #b47628;
    --bad:     #8a2e2e;
    --shadow: 0 1px 2px rgba(60,40,20,0.04), 0 3px 10px rgba(60,40,20,0.05);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–paper);
color: var(–ink);
font-family: ‘Inter’, -apple-system, sans-serif;
font-size: 14px;
line-height: 1.5;
min-height: 100vh;
padding: 32px 24px 64px;
-webkit-font-smoothing: antialiased;
font-feature-settings: “kern”, “liga”, “tnum”;
}

.container { max-width: 960px; margin: 0 auto; }

.serif { font-family: ‘EB Garamond’, Georgia, serif; }
.mono  { font-family: ‘JetBrains Mono’, monospace; font-variant-numeric: tabular-nums; }
.tnum  { font-variant-numeric: tabular-nums; }

/* ============ MASTHEAD ============ */
.masthead {
display: flex; justify-content: space-between; align-items: center; gap: 20px;
padding-bottom: 16px; margin-bottom: 20px;
border-bottom: 1px solid var(–ink);
flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo {
height: 44px; width: auto; display: block;
}
.brand-text { display: flex; flex-direction: column; gap: 2px; }
.brand-name {
font-family: ‘EB Garamond’, Georgia, serif;
font-size: 24px; font-weight: 500; letter-spacing: -0.01em; color: var(–ink);
line-height: 1;
}
.brand-sub {
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
letter-spacing: 0.14em; text-transform: uppercase; color: var(–ink-muted);
}

.masthead-right { display: flex; align-items: center; gap: 14px; }
.date-line { font-family: ‘JetBrains Mono’, monospace; font-size: 11px; color: var(–ink-soft); letter-spacing: 0.05em; }
.refresh-btn {
font-family: ‘JetBrains Mono’, monospace; font-size: 11px; font-weight: 500;
letter-spacing: 0.06em; text-transform: uppercase;
background: var(–ink); color: var(–paper); border: none;
padding: 8px 14px; cursor: pointer; transition: background 0.15s;
border-radius: 2px;
}
.refresh-btn:hover { background: var(–crimson); }

.sub-bar {
display: flex; justify-content: space-between; align-items: center;
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
letter-spacing: 0.1em; text-transform: uppercase; color: var(–ink-muted);
padding-bottom: 14px; border-bottom: 1px solid var(–rule);
}

/* ============ STATS ============ */
.stats {
display: grid; grid-template-columns: repeat(4, 1fr);
margin: 20px 0 8px; border: 1px solid var(–rule);
background: var(–card); border-radius: 3px;
}
.stat { padding: 16px 18px; border-right: 1px solid var(–rule); }
.stat:last-child { border-right: none; }
.stat-label {
font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
color: var(–ink-muted); font-weight: 500; margin-bottom: 6px;
}
.stat-value {
font-family: ‘EB Garamond’, Georgia, serif;
font-size: 32px; font-weight: 500; line-height: 1; color: var(–ink);
}
.stat-sub {
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
color: var(–ink-muted); margin-top: 5px; letter-spacing: 0.03em;
}

/* ============ TABS ============ */
.tabs {
display: flex; gap: 0; border-bottom: 1px solid var(–rule); margin-top: 36px;
}
.tab {
font-family: ‘JetBrains Mono’, monospace; font-size: 11px; font-weight: 500;
letter-spacing: 0.12em; text-transform: uppercase;
background: none; border: none; color: var(–ink-muted);
padding: 12px 18px 12px 0; cursor: pointer;
border-bottom: 2px solid transparent; margin-bottom: -1px;
transition: color 0.15s, border-color 0.15s;
}
.tab + .tab { padding-left: 18px; }
.tab.active { color: var(–ink); border-bottom-color: var(–crimson); }
.tab:hover:not(.active) { color: var(–ink-soft); }
.tab-count {
display: inline-block; margin-left: 6px; padding: 1px 6px;
background: var(–rule-soft); border-radius: 99px;
font-size: 9px; color: var(–ink-soft);
}

/* ============ BANNER ============ */
.banner {
background: rgba(180,118,40,0.08); border: 1px solid rgba(180,118,40,0.25);
border-left: 3px solid var(–warn);
padding: 12px 16px; margin: 18px 0; font-size: 13px; color: var(–ink-soft);
border-radius: 2px;
}

/* ============ PROJECT CARD ============ */
.project-card, .member-card {
background: var(–card); border: 1px solid var(–rule);
border-radius: 3px; padding: 22px; margin-bottom: 16px;
box-shadow: var(–shadow);
animation: rise 0.4s ease-out backwards;
}
.project-card:hover, .member-card:hover { border-color: var(–rule); box-shadow: 0 2px 4px rgba(60,40,20,0.06), 0 6px 18px rgba(60,40,20,0.06); }

.p-header {
display: flex; justify-content: space-between; align-items: baseline;
gap: 16px; flex-wrap: wrap; margin-bottom: 6px;
}
.p-title { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.p-name {
font-family: ‘EB Garamond’, Georgia, serif; font-weight: 500;
font-size: 24px; color: var(–ink); line-height: 1.1; letter-spacing: -0.01em;
}
.p-fullname {
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
color: var(–ink-faint); letter-spacing: 0.04em;
}
.p-percent {
font-family: ‘EB Garamond’, Georgia, serif;
font-size: 30px; font-weight: 500; line-height: 1;
}
.p-meta {
display: flex; flex-wrap: wrap; gap: 16px 20px; align-items: center;
font-size: 12px; color: var(–ink-soft);
padding: 10px 0 14px; margin-bottom: 2px;
border-bottom: 1px solid var(–rule-soft);
}
.p-meta-item { display: inline-flex; align-items: center; gap: 6px; }
.p-meta-label { color: var(–ink-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
.p-meta-value { font-family: ‘JetBrains Mono’, monospace; color: var(–ink); font-size: 12px; }

/* Chips */
.chip {
display: inline-flex; align-items: center; gap: 5px;
padding: 3px 8px; border-radius: 2px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
}
.chip-active  { background: rgba(90,127,62,0.12); color: var(–good); border: 1px solid rgba(90,127,62,0.25); }
.chip-ending  { background: rgba(180,118,40,0.10); color: var(–warn); border: 1px solid rgba(180,118,40,0.25); }
.chip-over    { background: rgba(138,46,46,0.10); color: var(–bad); border: 1px solid rgba(138,46,46,0.25); }
.chip-expired { background: transparent; color: var(–ink-muted); border: 1px solid var(–rule); }
.chip-pi      { background: rgba(156,122,44,0.12); color: var(–gold); border: 1px solid rgba(156,122,44,0.3); padding: 2px 6px; font-size: 9px; }

/* Segmented bar */
.seg-bar {
position: relative; height: 12px; border-radius: 2px;
background: var(–rule-soft); overflow: hidden; display: flex;
border: 1px solid var(–rule);
margin: 14px 0 8px;
}
.seg { height: 100%; transition: width 0.7s cubic-bezier(0.22,1,0.36,1); }
.seg:hover { filter: brightness(1.1); }
.seg-over { background: repeating-linear-gradient(45deg, var(–bad), var(–bad) 4px, rgba(138,46,46,0.5) 4px, rgba(138,46,46,0.5) 8px); }

.bar-footer {
display: flex; justify-content: space-between; align-items: baseline;
font-size: 11px; color: var(–ink-muted); font-family: ‘JetBrains Mono’, monospace;
}

/* Contributors */
.contributors { margin-top: 16px; }
.contrib-hed {
display: flex; justify-content: space-between; align-items: baseline;
font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
color: var(–ink-muted); font-weight: 500;
padding-bottom: 6px; margin-bottom: 4px;
border-bottom: 1px solid var(–rule-soft);
}
.contrib-row {
display: grid; grid-template-columns: 22px 10px 1fr auto auto;
gap: 10px; align-items: center;
padding: 7px 0; border-bottom: 1px dotted var(–rule-soft);
font-size: 13px;
}
.contrib-row:last-child { border-bottom: none; }
.contrib-rank {
font-family: ‘EB Garamond’, Georgia, serif; font-style: italic;
font-size: 15px; color: var(–ink-muted); text-align: right;
}
.contrib-swatch { width: 10px; height: 10px; border-radius: 2px; }
.contrib-name { display: flex; align-items: center; gap: 8px; color: var(–ink); }
.contrib-hours { font-family: ‘JetBrains Mono’, monospace; color: var(–ink); font-weight: 500; font-size: 12px; }
.contrib-jobs { font-family: ‘JetBrains Mono’, monospace; color: var(–ink-muted); font-size: 11px; min-width: 60px; text-align: right; }
.contrib-partial {
font-size: 9px; color: var(–ink-muted); letter-spacing: 0.08em;
text-transform: uppercase; font-family: ‘JetBrains Mono’, monospace;
padding: 2px 6px; background: var(–rule-soft); border-radius: 2px;
}

.expand-toggle {
margin-top: 12px; background: none; border: none; cursor: pointer;
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
letter-spacing: 0.1em; text-transform: uppercase; color: var(–crimson);
padding: 0; text-decoration: underline; text-decoration-color: rgba(138,31,31,0.3);
text-underline-offset: 3px;
}
.expand-toggle:hover { color: var(–ink); text-decoration-color: var(–ink); }

/* ============ MEMBER CARD ============ */
.m-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
.m-name-block { display: flex; align-items: center; gap: 12px; }
.m-avatar {
width: 42px; height: 42px; border-radius: 50%;
background: var(–card-alt); border: 1px solid var(–rule);
display: flex; align-items: center; justify-content: center;
font-family: ‘EB Garamond’, Georgia, serif; font-weight: 500; font-size: 20px;
}
.m-name {
font-family: ‘EB Garamond’, Georgia, serif; font-size: 22px; font-weight: 500;
color: var(–ink); line-height: 1.1;
}
.m-meta { font-family: ‘JetBrains Mono’, monospace; font-size: 10px; color: var(–ink-muted); letter-spacing: 0.05em; margin-top: 2px; }
.m-running {
display: inline-flex; align-items: center; gap: 6px;
background: rgba(90,127,62,0.1); color: var(–good); padding: 4px 10px;
font-size: 11px; font-weight: 500; border-radius: 99px;
border: 1px solid rgba(90,127,62,0.25);
}
.m-running-dot { width: 6px; height: 6px; border-radius: 50%; background: var(–good); animation: pulse 2s infinite; }

.m-balance {
margin: 18px 0 8px; padding: 14px 16px;
background: var(–card-alt); border: 1px solid var(–rule-soft); border-radius: 3px;
display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
.m-balance.non-pi { grid-template-columns: repeat(2, 1fr); }
.m-balance-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(–ink-muted); margin-bottom: 4px; font-weight: 500; }
.m-balance-value { font-family: ‘EB Garamond’, Georgia, serif; font-size: 24px; font-weight: 500; color: var(–ink); line-height: 1; }
.m-balance-sub { font-family: ‘JetBrains Mono’, monospace; font-size: 10px; color: var(–ink-muted); margin-top: 3px; }

.m-projects { margin-top: 16px; }
.m-project-row {
display: grid; grid-template-columns: 1fr auto auto;
gap: 14px; align-items: center; padding: 9px 0;
border-bottom: 1px dotted var(–rule-soft);
}
.m-project-row:last-child { border-bottom: none; }
.m-project-name-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.m-project-name { font-family: ‘JetBrains Mono’, monospace; font-size: 12px; color: var(–ink); font-weight: 500; }
.m-project-bar {
grid-column: 1 / -1; height: 3px; background: var(–rule-soft); border-radius: 2px;
overflow: hidden; margin-top: 3px;
}
.m-project-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }

/* Jobs */
.jobs-list { margin-top: 14px; }
.jobs-head, .job-row {
display: grid; grid-template-columns: 85px 1fr 100px 70px 50px;
gap: 10px; font-size: 12px; font-family: ‘JetBrains Mono’, monospace;
align-items: center;
}
.jobs-head {
font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
color: var(–ink-muted); padding: 6px 0;
border-bottom: 1px solid var(–rule-soft);
}
.job-row { padding: 7px 0; border-bottom: 1px dotted var(–rule-soft); }
.job-row:last-child { border-bottom: none; }
.job-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; color: var(–ink); font-family: ‘Inter’, sans-serif; }
.state-pill {
display: inline-flex; align-items: center; gap: 5px;
padding: 2px 7px; border-radius: 2px;
font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
}
.state-dot { width: 5px; height: 5px; border-radius: 50%; }
.state-RUNNING { background: rgba(90,127,62,0.12); color: var(–good); border: 1px solid rgba(90,127,62,0.25); }
.state-RUNNING .state-dot { background: var(–good); animation: pulse 2s infinite; }
.state-PENDING { background: rgba(180,118,40,0.1); color: var(–warn); border: 1px solid rgba(180,118,40,0.25); }
.state-PENDING .state-dot { background: var(–warn); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.project-card:nth-child(1), .member-card:nth-child(1) { animation-delay: 0.02s; }
.project-card:nth-child(2), .member-card:nth-child(2) { animation-delay: 0.05s; }
.project-card:nth-child(3), .member-card:nth-child(3) { animation-delay: 0.08s; }
.project-card:nth-child(4), .member-card:nth-child(4) { animation-delay: 0.11s; }
.project-card:nth-child(5), .member-card:nth-child(5) { animation-delay: 0.14s; }
.project-card:nth-child(6), .member-card:nth-child(6) { animation-delay: 0.17s; }
.project-card:nth-child(7), .member-card:nth-child(7) { animation-delay: 0.20s; }
.project-card:nth-child(8), .member-card:nth-child(8) { animation-delay: 0.23s; }

.page-footer {
margin-top: 48px; padding-top: 18px;
border-top: 1px solid var(–rule);
display: flex; justify-content: space-between; align-items: center;
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
color: var(–ink-muted); letter-spacing: 0.05em;
flex-wrap: wrap; gap: 10px;
}
.page-footer a { color: var(–crimson); text-decoration: none; }
.page-footer a:hover { text-decoration: underline; }

.loading {
text-align: center; padding: 80px 20px; color: var(–ink-muted);
font-family: ‘EB Garamond’, Georgia, serif; font-style: italic; font-size: 18px;
}

/* Responsive */
@media (max-width: 700px) {
.stats { grid-template-columns: repeat(2, 1fr); }
.stat:nth-child(2) { border-right: none; }
.stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid var(–rule); }
.m-balance, .m-balance.non-pi { grid-template-columns: 1fr; }
.jobs-head, .job-row { grid-template-columns: 70px 1fr 80px; }
.jobs-head span:nth-child(4), .jobs-head span:nth-child(5),
.job-row > *:nth-child(4), .job-row > *:nth-child(5) { display: none; }
.brand-name { font-size: 20px; }
.brand-logo { height: 36px; }
}
</style>

</head>
<body>
<div class="container">

  <header class="masthead">
    <div class="brand">
      <img class="brand-logo" src="https://gladia.di.uniroma1.it/media/logo.svg" alt="GLADIA">
      <div class="brand-text">
        <div class="brand-name">GLADIA</div>
        <div class="brand-sub">HPC Console · Leonardo</div>
      </div>
    </div>
    <div class="masthead-right">
      <div class="date-line" id="date-line">—</div>
      <button class="refresh-btn" onclick="fetchData()">↻ Refresh</button>
    </div>
  </header>

  <div class="sub-bar">
    <span>Compute usage across active ISCRA allocations</span>
    <span id="last-refresh">—</span>
  </div>

  <div id="banner"></div>

  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" data-view="projects" onclick="setView('projects')">Projects <span class="tab-count" id="ct-projects">0</span></button>
    <button class="tab" data-view="members" onclick="setView('members')">Members <span class="tab-count" id="ct-members">0</span></button>
  </div>

  <div id="content"><div class="loading">Fetching the latest reports…</div></div>

  <footer class="page-footer">
    <span>GLADIA · Sapienza University of Rome</span>
    <span><a href="https://gladia.di.uniroma1.it" target="_blank">gladia.di.uniroma1.it</a> · <a href="https://github.com/alexzilligmm/gladia-dashboard" target="_blank">source</a></span>
  </footer>
</div>

<script>
const REPO = "alexzilligmm/gladia-dashboard";

const USER_COLORS = [
  "#2a5a8a", "#5a7f3e", "#b47628", "#8a2e2e", "#4a6d5c",
  "#9c7a2c", "#6e4e7d", "#34656d", "#8b6f47", "#4d5d73",
  "#7b4d62", "#5d7c7a"
];
function userColor(name) {
  let h = 0; for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) | 0;
  return USER_COLORS[Math.abs(h) % USER_COLORS.length];
}

let state = { users: [], projects: [], view: "projects", expanded: {} };

function parseHours(str) {
  if (!str) return 0;
  const p = String(str).split(":");
  return parseInt(p[0] || 0) + parseInt(p[1] || 0) / 60 + parseInt(p[2] || 0) / 3600;
}
function fmtHours(h) {
  if (h >= 100000) return (h/1000).toFixed(0) + "k";
  if (h >= 1000) return (h/1000).toFixed(1) + "k";
  return Math.round(h).toLocaleString();
}
function fmtInt(n) { return Number(n).toLocaleString(); }
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
}
function parseDate(yyyymmdd) {
  return new Date(yyyymmdd.slice(0,4) + "-" + yyyymmdd.slice(4,6) + "-" + yyyymmdd.slice(6,8));
}
function daysBetween(d) { return Math.ceil((d - Date.now()) / 86400000); }
function fmtMonth(yyyymmdd) {
  return parseDate(yyyymmdd).toLocaleDateString("en-US", { month: "short", year: "numeric" });
}
function projectStatus(b) {
  const days = daysBetween(parseDate(b.end));
  const over = b.percent >= 100;
  if (days < 0) return { key: "expired", label: `ended ${-days}d ago`, chipClass: "chip-expired" };
  if (over)     return { key: "over",    label: `${days}d · over quota`, chipClass: "chip-over" };
  if (days<30)  return { key: "ending",  label: `${days}d left`,         chipClass: "chip-ending" };
  return           { key: "active",  label: `${days}d left`,         chipClass: "chip-active" };
}
function pctColor(p) {
  if (p >= 100) return "var(--bad)";
  if (p >= 90)  return "var(--warn)";
  return "var(--ink)";
}
function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function fetchData() {
  document.getElementById("content").innerHTML = '<div class="loading">Fetching the latest reports…</div>';
  document.getElementById("banner").innerHTML = "";
  let users = [], projects = [];
  try {
    const dataList = await fetch(`https://api.github.com/repos/${REPO}/contents/data`);
    if (dataList.ok) {
      const files = (await dataList.json()).filter(f => f.name.endsWith(".json"));
      users = await Promise.all(files.map(f => fetch(f.download_url).then(r => r.json())));
    }
    const projList = await fetch(`https://api.github.com/repos/${REPO}/contents/projects`);
    if (projList.ok) {
      const files = (await projList.json()).filter(f => f.name.endsWith(".json"));
      projects = await Promise.all(files.map(f => fetch(f.download_url).then(r => r.json())));
    }
    if (users.length === 0) {
      document.getElementById("banner").innerHTML = '<div class="banner">No data yet — waiting for members to log into Leonardo and push their status.</div>';
    }
  } catch (e) {
    document.getElementById("banner").innerHTML = `<div class="banner">Could not reach the archive: ${esc(e.message)}</div>`;
  }
  state.users = users;
  state.projects = projects;

  const now = new Date();
  document.getElementById("date-line").textContent = now.toLocaleDateString("en-GB", { weekday: "short", day: "2-digit", month: "short" }).toUpperCase();
  document.getElementById("last-refresh").textContent = `Refreshed ${now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}`;
  render();
}

function aggregateBudgets() {
  const m = {};
  state.users.forEach(u => u.budgets?.forEach(b => { m[b.account] = b; }));
  return Object.values(m);
}
function setView(v) {
  state.view = v;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === v));
  render();
}
function toggleExpand(k) {
  state.expanded[k] = !state.expanded[k];
  render();
}

function getContributorsForProject(account) {
  const piReport = state.projects.find(p => p.account === account);
  if (piReport?.members?.length) {
    return {
      contributors: piReport.members.map(m => ({ user: m.user, hours: parseHours(m.consumed), jobs: m.num_jobs })),
      pi: piReport.pi, isPartial: false
    };
  }
  const list = [];
  state.users.forEach(u => {
    const usage = (u.usage || []).find(x => x.account === account);
    if (usage) list.push({ user: u.user, hours: parseHours(usage.consumed), jobs: usage.num_jobs });
  });
  let pi = null;
  for (const u of state.users) {
    if ((u.pi_of || []).includes(account)) { pi = u.user; break; }
  }
  return { contributors: list, pi, isPartial: true };
}

function render() {
  const allBudgets = aggregateBudgets();
  const active = allBudgets.filter(b => projectStatus(b).key !== "expired").length;
  const over = allBudgets.filter(b => b.percent >= 100 && projectStatus(b).key !== "expired").length;
  const running = state.users.reduce((s,u) => s + (u.jobs?.filter(j => j.state === "RUNNING").length || 0), 0);
  const totalConsumed = allBudgets.reduce((s,b) => s + b.consumed, 0);

  document.getElementById("stats").innerHTML = `
    <div class="stat">
      <div class="stat-label">Projects</div>
      <div class="stat-value tnum">${active}</div>
      <div class="stat-sub">of ${allBudgets.length} · ${over} over</div>
    </div>
    <div class="stat">
      <div class="stat-label">Members</div>
      <div class="stat-value tnum">${state.users.length}</div>
      <div class="stat-sub">reporting</div>
    </div>
    <div class="stat">
      <div class="stat-label">Running</div>
      <div class="stat-value tnum" style="color:${running>0?'var(--good)':'var(--ink-muted)'}">${running}</div>
      <div class="stat-sub">jobs on cluster</div>
    </div>
    <div class="stat">
      <div class="stat-label">Consumed</div>
      <div class="stat-value tnum">${fmtHours(totalConsumed)}</div>
      <div class="stat-sub">core-hours</div>
    </div>
  `;

  document.getElementById("ct-projects").textContent = allBudgets.length;
  document.getElementById("ct-members").textContent = state.users.length;

  document.getElementById("content").innerHTML =
    state.view === "projects" ? renderProjects() : renderMembers();
}

function renderProjects() {
  const budgets = aggregateBudgets();
  if (budgets.length === 0) return '<div class="loading">No projects yet.</div>';

  const order = { active: 0, ending: 1, over: 2, expired: 3 };
  budgets.sort((a,b) => {
    const sa = projectStatus(a), sb = projectStatus(b);
    if (order[sa.key] !== order[sb.key]) return order[sa.key] - order[sb.key];
    return b.percent - a.percent;
  });

  return `<div style="margin-top:20px">${budgets.map(renderProjectCard).join("")}</div>`;
}

function renderProjectCard(b) {
  const { contributors, pi, isPartial } = getContributorsForProject(b.account);
  contributors.sort((a,c) => c.hours - a.hours);

  const status = projectStatus(b);
  const totalPct = b.percent;

  let running = 0;
  const segments = contributors.filter(c => c.hours > 0.1).map(c => {
    const widthPct = Math.min((c.hours / b.total) * 100, 100 - running);
    running += widthPct;
    return { ...c, widthPct };
  });
  const knownSum = contributors.reduce((s,c)=>s+c.hours, 0);
  const unknownHours = Math.max(0, b.consumed - knownSum);
  const unknownWidth = Math.min((unknownHours / b.total) * 100, Math.max(0, 100 - running));
  const overQuota = totalPct > 100 ? Math.min(totalPct - 100, 20) : 0;

  const isExpanded = state.expanded[`proj-${b.account}`];
  const showRows = isExpanded ? contributors : contributors.slice(0, 5);

  return `
    <article class="project-card">
      <div class="p-header">
        <div class="p-title">
          <span class="p-name">${esc(b.account.replace("IscrC_", ""))}</span>
          <span class="p-fullname">${esc(b.account)}</span>
        </div>
        <span class="p-percent tnum" style="color:${pctColor(totalPct)}">${totalPct.toFixed(1)}<span style="font-size:18px">%</span></span>
      </div>

      <div class="p-meta">
        ${pi ? `<span class="p-meta-item"><span class="p-meta-label">PI</span><span class="p-meta-value">${esc(pi)}</span></span>` : ""}
        <span class="p-meta-item"><span class="p-meta-label">Period</span><span class="p-meta-value">${fmtMonth(b.start)} → ${fmtMonth(b.end)}</span></span>
        <span class="p-meta-item"><span class="chip ${status.chipClass}">${status.label}</span></span>
        <span class="p-meta-item" style="margin-left:auto"><span class="p-meta-label">Quota</span><span class="p-meta-value">${fmtInt(b.total)} h</span></span>
      </div>

      <div class="seg-bar">
        ${segments.map(s => `<div class="seg" style="width:${s.widthPct}%;background:${userColor(s.user)}" title="${esc(s.user)}: ${fmtHours(s.hours)} h"></div>`).join("")}
        ${unknownWidth > 0 ? `<div class="seg" style="width:${unknownWidth}%;background:var(--rule);opacity:0.5" title="Unreported: ${fmtHours(unknownHours)} h"></div>` : ""}
        ${overQuota > 0 ? `<div class="seg seg-over" style="width:${overQuota}%"></div>` : ""}
      </div>
      <div class="bar-footer">
        <span>${fmtInt(b.consumed)} / ${fmtInt(b.total)} h</span>
        <span>${b.total-b.consumed > 0 ? fmtInt(b.total-b.consumed)+" h remaining" : Math.abs(b.total-b.consumed).toLocaleString()+" h over"}</span>
      </div>

      ${contributors.length > 0 ? `
        <div class="contributors">
          <div class="contrib-hed">
            <span>Contributors · ${contributors.length}</span>
            ${isPartial ? `<span class="contrib-partial">partial</span>` : ""}
          </div>
          ${showRows.map((c, i) => `
            <div class="contrib-row">
              <span class="contrib-rank">${i+1}</span>
              <span class="contrib-swatch" style="background:${userColor(c.user)}"></span>
              <span class="contrib-name">
                ${esc(c.user)}
                ${pi === c.user ? '<span class="chip chip-pi">PI</span>' : ''}
              </span>
              <span class="contrib-hours tnum">${fmtHours(c.hours)} h</span>
              <span class="contrib-jobs tnum">${fmtInt(c.jobs)} jobs</span>
            </div>
          `).join("")}
          ${contributors.length > 5 ? `
            <button class="expand-toggle" onclick="toggleExpand('proj-${esc(b.account)}')">
              ${isExpanded ? "Show top 5" : `Show all ${contributors.length}`}
            </button>` : ""}
        </div>
      ` : `
        <div class="contributors">
          <div class="contrib-hed"><span>No contributors reported</span></div>
        </div>
      `}
    </article>
  `;
}

function renderMembers() {
  if (state.users.length === 0) return '<div class="loading">No members have pushed yet.</div>';

  const budgetMap = {};
  state.users.forEach(u => u.budgets?.forEach(b => { budgetMap[b.account] = b; }));

  const withStats = state.users.map(u => {
    const taken = (u.usage || []).reduce((s, x) => s + parseHours(x.consumed), 0);
    const totalJobs = (u.usage || []).reduce((s, x) => s + (x.num_jobs || 0), 0);
    let donated = 0;
    (u.pi_of || []).forEach(acc => {
      const b = budgetMap[acc];
      const myUsage = (u.usage || []).find(x => x.account === acc);
      if (b) donated += Math.max(0, b.consumed - (myUsage ? parseHours(myUsage.consumed) : 0));
    });
    return { user: u, taken, donated, totalJobs };
  }).sort((a, b) => b.taken - a.taken);

  return `<div style="margin-top:20px">${withStats.map(renderMemberCard).join("")}</div>`;
}

function renderMemberCard({ user, taken, donated, totalJobs }) {
  const runningJobs = (user.jobs || []).filter(j => j.state === "RUNNING");
  const isPi = (user.pi_of || []).length > 0;
  const net = donated - taken;
  const color = userColor(user.user);
  const projects = (user.usage || []).slice().sort((a,b) => parseHours(b.consumed) - parseHours(a.consumed));
  const maxHours = projects.length > 0 ? parseHours(projects[0].consumed) : 1;

  const isExpandedJobs = state.expanded[`jobs-${user.user}`];
  const jobsToShow = isExpandedJobs ? (user.jobs || []) : (user.jobs || []).slice(0, 3);

  return `
    <article class="member-card">
      <div class="m-top">
        <div class="m-name-block">
          <div class="m-avatar" style="color:${color}">${esc(user.user.slice(0,1).toUpperCase())}</div>
          <div>
            <div class="m-name">${esc(user.user)} ${isPi ? '<span class="chip chip-pi" style="vertical-align:middle;margin-left:6px">PI</span>' : ''}</div>
            <div class="m-meta">${esc(user.hostname || "")} · ${timeAgo(user.timestamp)}</div>
          </div>
        </div>
        ${runningJobs.length > 0 ? `
          <span class="m-running"><span class="m-running-dot"></span>${runningJobs.length} running</span>
        ` : ""}
      </div>

      <div class="m-balance ${isPi ? '' : 'non-pi'}">
        <div>
          <div class="m-balance-label">Consumed</div>
          <div class="m-balance-value tnum">${fmtHours(taken)}</div>
          <div class="m-balance-sub">core-hours · ${fmtInt(totalJobs)} jobs</div>
        </div>
        ${isPi ? `
          <div>
            <div class="m-balance-label">Donated</div>
            <div class="m-balance-value tnum" style="color:var(--good)">${fmtHours(donated)}</div>
            <div class="m-balance-sub">core-hours · ${user.pi_of.length} project${user.pi_of.length > 1 ? 's' : ''}</div>
          </div>
          <div>
            <div class="m-balance-label">Net</div>
            <div class="m-balance-value tnum" style="color:${net >= 0 ? 'var(--good)' : 'var(--bad)'}">${net >= 0 ? '+' : ''}${fmtHours(Math.abs(net))}</div>
            <div class="m-balance-sub">donated − taken</div>
          </div>
        ` : `
          <div>
            <div class="m-balance-label">Projects</div>
            <div class="m-balance-value tnum">${projects.length}</div>
            <div class="m-balance-sub">contributing to</div>
          </div>
        `}
      </div>

      ${runningJobs.length > 0 ? `
        <div class="jobs-list">
          <div class="jobs-head">
            <span>ID</span><span>Name</span><span>State</span><span>Time</span><span>Nodes</span>
          </div>
          ${jobsToShow.map(j => `
            <div class="job-row">
              <span style="color:var(--ink-muted)">${esc(j.id)}</span>
              <span class="job-name">${esc(j.name)}</span>
              <span class="state-pill state-${esc(j.state)}"><span class="state-dot"></span>${esc(j.state)}</span>
              <span style="color:var(--ink-muted)">${esc(j.time)}</span>
              <span style="color:var(--ink-muted)">${esc(j.nodes)}</span>
            </div>
          `).join("")}
          ${(user.jobs || []).length > 3 ? `
            <button class="expand-toggle" onclick="toggleExpand('jobs-${esc(user.user)}')">
              ${isExpandedJobs ? "Show top 3" : `Show all ${user.jobs.length} jobs`}
            </button>
          ` : ""}
        </div>
      ` : ""}

      ${projects.length > 0 ? `
        <div class="m-projects">
          <div class="contrib-hed" style="padding-bottom:6px;margin:16px 0 8px">
            <span>Per-project consumption</span>
            <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">${projects.length}</span>
          </div>
          ${projects.map(p => {
            const h = parseHours(p.consumed);
            const pctOfMax = (h / maxHours) * 100;
            return `
              <div class="m-project-row">
                <div class="m-project-name-wrap">
                  <span class="contrib-swatch" style="background:${color}"></span>
                  <span class="m-project-name">${esc(p.account.replace("IscrC_",""))}</span>
                  ${(user.pi_of || []).includes(p.account) ? '<span class="chip chip-pi">PI</span>' : ''}
                </div>
                <span class="contrib-hours tnum">${fmtHours(h)} h</span>
                <span class="contrib-jobs tnum">${fmtInt(p.num_jobs)} jobs</span>
                <div class="m-project-bar"><div class="m-project-bar-fill" style="width:${pctOfMax}%;background:${color}"></div></div>
              </div>
            `;
          }).join("")}
        </div>
      ` : ""}
    </article>
  `;
}

fetchData();
</script>

</body>
</html>
