<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GLADIA · HPC Console</title>
<link rel="icon" href="assets/logo_gladia_un_colore.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#f6f1e6;--card:#fff;--card-alt:#faf6ea;--ink:#1c1a16;--ink-soft:#4a443c;--ink-muted:#8a8478;--ink-faint:#c0b9a8;--rule:#ddd2b8;--rule-soft:#ebe3ce;--brand:#822235;--brand-soft:rgba(130,34,53,.08);--you:#2a5a8a;--gold:#9c7a2c;--good:#5a7f3e;--warn:#b47628;--bad:#822235;--shadow:0 1px 2px rgba(60,40,20,.04),0 3px 10px rgba(60,40,20,.05)}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--paper);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;padding:32px 24px 64px;-webkit-font-smoothing:antialiased}
body.midnight-theme{--paper:#1c1a16;--card:#25211c;--card-alt:#2d2822;--ink:#f6f1e6;--ink-soft:#ebe3ce;--ink-muted:#c0b9a8;--ink-faint:#8a8478;--rule:#4a443c;--rule-soft:#3a342d;--brand:#7dddc9;--brand-soft:rgba(125,221,201,.12);--you:#d5a575;--gold:#6385d3;--good:#a580c1;--warn:#4b89d7;--bad:#7dddc9;--shadow:0 1px 2px rgba(0,0,0,.25),0 4px 18px rgba(0,0,0,.3)}
.container{max-width:960px;margin:0 auto}.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}.tnum{font-variant-numeric:tabular-nums}
.masthead{display:flex;justify-content:space-between;align-items:center;gap:20px;padding-bottom:16px;margin-bottom:20px;border-bottom:1px solid var(--ink);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}.brand-logo{height:44px;width:auto}
.brand-name{font-family:'EB Garamond',Georgia,serif;font-size:24px;font-weight:500;color:var(--ink);line-height:1}.brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-muted)}
.masthead-right{display:flex;align-items:center;gap:14px}.date-line{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.05em}
.refresh-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;padding:8px 14px;cursor:pointer;border-radius:2px;transition:background .15s}.refresh-btn:hover{background:var(--brand)}
.sub-bar{display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);padding-bottom:14px;border-bottom:1px solid var(--rule)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);margin:20px 0 8px;border:1px solid var(--rule);background:var(--card);border-radius:3px}.stat{padding:16px 18px;border-right:1px solid var(--rule)}.stat:last-child{border-right:none}
.stat-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:6px}.stat-value{font-family:'EB Garamond',Georgia,serif;font-size:32px;font-weight:500;line-height:1}.stat-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted);margin-top:5px}
.tabs-bar{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--rule);margin-top:36px}.tabs{display:flex}
.tab{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;color:var(--ink-muted);padding:12px 18px 12px 0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}.tab+.tab{padding-left:18px}.tab.active{color:var(--ink);border-bottom-color:var(--brand)}.tab:hover:not(.active){color:var(--ink-soft)}
.tab-count{display:inline-block;margin-left:6px;padding:1px 6px;background:var(--rule-soft);border-radius:99px;font-size:9px;color:var(--ink-soft)}
.toolbar{display:flex;align-items:center;gap:12px;padding-bottom:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted)}
.toolbar label{letter-spacing:.1em;text-transform:uppercase}.toolbar select{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--card);border:1px solid var(--rule);border-radius:2px;padding:4px 22px 4px 8px;color:var(--ink);cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238a8478'/></svg>");background-repeat:no-repeat;background-position:right 6px center}
.filter-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;-webkit-user-select:none;user-select:none}.filter-toggle input{accent-color:var(--brand);cursor:pointer}
.banner{background:rgba(180,118,40,.08);border:1px solid rgba(180,118,40,.25);border-left:3px solid var(--warn);padding:12px 16px;margin:18px 0;font-size:13px;color:var(--ink-soft);border-radius:2px}
.project-card,.member-card{background:var(--card);border:1px solid var(--rule);border-radius:3px;padding:22px;margin-bottom:16px;box-shadow:var(--shadow);animation:rise .4s ease-out backwards}
.project-card:hover,.member-card:hover{box-shadow:0 2px 4px rgba(60,40,20,.06),0 6px 18px rgba(60,40,20,.06)}
.p-header{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:6px}.p-title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.p-name{font-family:'EB Garamond',Georgia,serif;font-weight:500;font-size:24px;color:var(--ink);line-height:1.1}.p-fullname{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
.p-percent{font-family:'EB Garamond',Georgia,serif;font-size:30px;font-weight:500;line-height:1}
.p-meta{display:flex;flex-wrap:wrap;gap:16px 20px;align-items:center;font-size:12px;color:var(--ink-soft);padding:10px 0 14px;border-bottom:1px solid var(--rule-soft)}.p-meta-item{display:inline-flex;align-items:center;gap:6px}
.p-meta-label{color:var(--ink-muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:500}.p-meta-value{font-family:'JetBrains Mono',monospace;color:var(--ink);font-size:12px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.chip-active{background:rgba(90,127,62,.12);color:var(--good);border:1px solid rgba(90,127,62,.25)}.chip-ending{background:rgba(180,118,40,.1);color:var(--warn);border:1px solid rgba(180,118,40,.25)}.chip-over{background:rgba(130,34,53,.1);color:var(--bad);border:1px solid rgba(130,34,53,.25)}.chip-expired{background:transparent;color:var(--ink-muted);border:1px solid var(--rule)}.chip-pi{background:rgba(156,122,44,.12);color:var(--gold);border:1px solid rgba(156,122,44,.3);padding:2px 6px}
.seg-bar{position:relative;height:12px;border-radius:2px;background:var(--rule-soft);overflow:hidden;display:flex;border:1px solid var(--rule);margin:14px 0 8px}.seg{height:100%;transition:width .7s cubic-bezier(.22,1,.36,1)}.seg:hover{filter:brightness(1.1)}.seg-over{background:repeating-linear-gradient(45deg,var(--bad),var(--bad) 4px,rgba(130,34,53,.5) 4px,rgba(130,34,53,.5) 8px)}.seg-unreported{background:repeating-linear-gradient(45deg,var(--ink-faint),var(--ink-faint) 3px,var(--rule) 3px,var(--rule) 6px)}
.bar-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace}
.contributors{margin-top:16px}.contrib-hed{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;padding-bottom:6px;margin-bottom:4px;border-bottom:1px solid var(--rule-soft)}
.contrib-row{display:grid;grid-template-columns:22px 10px 1fr auto auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px dotted var(--rule-soft);font-size:13px}.contrib-row:last-child{border-bottom:none}
.contrib-rank{font-family:'EB Garamond',Georgia,serif;font-style:italic;font-size:15px;color:var(--ink-muted);text-align:right}.contrib-swatch{width:10px;height:10px;border-radius:2px}.contrib-name{display:flex;align-items:center;gap:8px;color:var(--ink)}.contrib-hours{font-family:'JetBrains Mono',monospace;color:var(--ink);font-weight:500;font-size:12px}.contrib-jobs{font-family:'JetBrains Mono',monospace;color:var(--ink-muted);font-size:11px;min-width:60px;text-align:right}
.contrib-partial{font-size:9px;color:var(--ink-muted);letter-spacing:.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;padding:2px 6px;background:var(--rule-soft);border-radius:2px}
.expand-toggle{margin-top:12px;background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);padding:0;text-decoration:underline;text-decoration-color:rgba(130,34,53,.3);text-underline-offset:3px}.expand-toggle:hover{color:var(--ink)}
.m-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}.m-name-block{display:flex;align-items:center;gap:12px}
.m-avatar{width:42px;height:42px;border-radius:50%;background:var(--card-alt);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-family:'EB Garamond',Georgia,serif;font-weight:500;font-size:20px}
.m-name{font-family:'EB Garamond',Georgia,serif;font-size:22px;font-weight:500;color:var(--ink);line-height:1.1}.m-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted);margin-top:2px}
.m-running{display:inline-flex;align-items:center;gap:6px;background:rgba(90,127,62,.1);color:var(--good);padding:4px 10px;font-size:11px;font-weight:500;border-radius:99px;border:1px solid rgba(90,127,62,.25)}.m-running-dot{width:6px;height:6px;border-radius:50%;background:var(--good);animation:pulse 2s infinite}
.m-balance{margin:18px 0 8px;padding:14px 16px;background:var(--card-alt);border:1px solid var(--rule-soft);border-radius:3px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.m-balance.non-pi{grid-template-columns:repeat(2,1fr)}
.m-balance-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;font-weight:500}.m-balance-value{font-family:'EB Garamond',Georgia,serif;font-size:24px;font-weight:500;line-height:1}.m-balance-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted);margin-top:3px}
.m-depletion{margin:10px 0 4px;padding:10px 12px;border:1px solid var(--rule-soft);background:var(--card-alt);border-radius:3px}.m-depletion-main{font-family:'EB Garamond',Georgia,serif;font-size:22px;line-height:1.1}.m-depletion-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted);margin-top:3px}
.m-project-row{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:9px 0;border-bottom:1px dotted var(--rule-soft)}.m-project-row:last-child{border-bottom:none}.m-project-name-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.m-project-name{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);font-weight:500}
.m-project-bar{grid-column:1/-1;height:3px;background:var(--rule-soft);border-radius:2px;overflow:hidden;margin-top:3px}.m-project-bar-fill{height:100%;border-radius:2px;transition:width .6s}
.jobs-list{margin-top:14px}.jobs-head,.job-row{display:grid;grid-template-columns:85px 1fr 100px 70px 50px;gap:10px;font-size:12px;font-family:'JetBrains Mono',monospace;align-items:center}
.jobs-head{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(--ink-muted);padding:6px 0;border-bottom:1px solid var(--rule-soft)}.job-row{padding:7px 0;border-bottom:1px dotted var(--rule-soft)}.job-row:last-child{border-bottom:none}
.job-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--ink);font-family:'Inter',sans-serif}
.state-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:2px;font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}.state-dot{width:5px;height:5px;border-radius:50%}
.state-RUNNING{background:rgba(90,127,62,.12);color:var(--good);border:1px solid rgba(90,127,62,.25)}.state-RUNNING .state-dot{background:var(--good);animation:pulse 2s infinite}
.state-PENDING{background:rgba(180,118,40,.1);color:var(--warn);border:1px solid rgba(180,118,40,.25)}.state-PENDING .state-dot{background:var(--warn)}
.lb-section{margin-bottom:32px}.lb-title{font-family:'EB Garamond',Georgia,serif;font-size:22px;font-weight:500;margin-bottom:4px}.lb-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.lb-row{display:grid;grid-template-columns:28px 12px 1fr auto;gap:10px;align-items:center;padding:10px 16px;background:var(--card);border:1px solid var(--rule);border-top:none;font-size:13px}.lb-row:first-of-type{border-top:1px solid var(--rule);border-radius:3px 3px 0 0}.lb-row:last-of-type{border-radius:0 0 3px 3px}
.lb-medal{font-size:18px;text-align:center;line-height:1}.lb-rank{font-family:'EB Garamond',Georgia,serif;font-style:italic;font-size:16px;color:var(--ink-muted);text-align:center}
.lb-name{font-weight:500}.lb-val{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:13px;color:var(--ink)}
.lb-bar-wrap{grid-column:3/5;height:4px;background:var(--rule-soft);border-radius:2px;overflow:hidden;margin-top:4px}.lb-bar-fill{height:100%;border-radius:2px}
.svd-card{background:var(--card);border:1px solid var(--rule);border-radius:3px;padding:22px;box-shadow:var(--shadow)}.svd-card canvas{width:100%;height:220px;display:block;margin-top:10px}
.chart-scroll{overflow-x:auto;overflow-y:hidden;padding-bottom:6px;position:relative}.chart-scroll canvas{display:block;height:220px;min-width:100%}
.chart-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.chart-head select{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--card);border:1px solid var(--rule);border-radius:2px;padding:4px 22px 4px 8px;color:var(--ink);cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238a8478'/></svg>");background-repeat:no-repeat;background-position:right 6px center}
.svd-legend{display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11px}.svd-legend-item{display:flex;align-items:center;gap:6px}.svd-legend-dot{width:10px;height:3px;border-radius:1px}
/* ============  GUIDE TAB  ============ */
.guide-section{background:var(--card);border:1px solid var(--rule);border-radius:3px;padding:22px;margin-top:20px;box-shadow:var(--shadow);animation:rise .4s ease-out backwards}
.guide-section:nth-child(1){animation-delay:.02s}.guide-section:nth-child(2){animation-delay:.05s}.guide-section:nth-child(3){animation-delay:.08s}.guide-section:nth-child(4){animation-delay:.11s}.guide-section:nth-child(5){animation-delay:.14s}
.guide-title{font-family:'EB Garamond',Georgia,serif;font-size:22px;font-weight:500;margin-bottom:4px;color:var(--ink)}
.guide-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.guide-prose{font-size:14px;color:var(--ink-soft);line-height:1.65}
.guide-prose p+p{margin-top:8px}
.guide-prose code,.tip-body code,.storage-table code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--card-alt);padding:1px 6px;border-radius:2px;color:var(--brand);border:1px solid var(--rule-soft)}
.tips-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.tip{padding:14px 16px;background:var(--card-alt);border:1px solid var(--rule-soft);border-radius:3px;transition:border-color .15s}
.tip:hover{border-color:var(--rule)}
.tip-head{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);font-weight:600;margin-bottom:6px}
.tip-body{font-size:13px;color:var(--ink-soft);line-height:1.55}
.tip-body code{font-size:11.5px;padding:1px 5px}
.storage-table{width:100%;border-collapse:collapse;margin-top:6px}
.storage-table th,.storage-table td{text-align:left;padding:9px 10px;border-bottom:1px dotted var(--rule-soft);font-size:13px;vertical-align:top}
.storage-table th{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;border-bottom:1px solid var(--rule);padding-bottom:8px}
.storage-table td{color:var(--ink-soft)}.storage-table tr:last-child td{border-bottom:none}
.storage-table .col-quota{font-family:'JetBrains Mono',monospace;color:var(--ink);font-variant-numeric:tabular-nums}
.formula{background:var(--card-alt);border-left:3px solid var(--brand);padding:14px 18px;font-family:'JetBrains Mono',monospace;font-size:13px;margin:12px 0;border-radius:2px;color:var(--ink);line-height:1.8;overflow-x:auto}
.gen-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.2fr);gap:22px;align-items:start}
@media(max-width:800px){.gen-grid{grid-template-columns:1fr}}
.gen-form{display:flex;flex-direction:column;gap:14px}
.form-row{display:flex;flex-direction:column;gap:5px}
.form-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-muted);font-weight:500}
.form-input{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--card-alt);border:1px solid var(--rule);border-radius:2px;padding:9px 11px;color:var(--ink);transition:border-color .15s;width:100%}
.form-input:focus{outline:none;border-color:var(--brand);background:#fff}
select.form-input{cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238a8478'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.form-help{font-size:11px;color:var(--ink-muted);font-style:italic;line-height:1.4}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--card-alt);border:1px solid var(--rule-soft);border-radius:2px;cursor:pointer;transition:border-color .15s}
.checkbox-row:hover{border-color:var(--rule)}
.checkbox-row input{accent-color:var(--brand);margin-top:3px;cursor:pointer}
.checkbox-row-text{font-size:13px;color:var(--ink);font-weight:500}
.checkbox-row-sub{font-size:11px;color:var(--ink-muted);margin-top:2px;font-family:'JetBrains Mono',monospace;letter-spacing:.02em}
.resource-summary{padding:10px 13px;background:rgba(90,127,62,.08);border:1px solid rgba(90,127,62,.25);border-radius:2px;font-size:11.5px;font-family:'JetBrains Mono',monospace;color:var(--good);line-height:1.55}
.resource-summary.warn{background:rgba(180,118,40,.08);border-color:rgba(180,118,40,.3);color:var(--warn)}
.tpl-preview{background:#1c1a16;color:#f6f1e6;border-radius:3px;padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;white-space:pre;overflow-x:auto;max-height:520px;overflow-y:auto;border:1px solid #000;margin:0 0 10px}
.tpl-preview .tpl-dir{color:#d4a657;font-weight:600}.tpl-preview .tpl-cmt{color:#8a8478}.tpl-preview .tpl-str{color:#b8d49a}
.tpl-actions{display:flex;gap:10px;flex-wrap:wrap}
.tpl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border-radius:2px;border:1px solid var(--rule);background:var(--card);color:var(--ink);cursor:pointer;transition:all .15s}
.tpl-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.tpl-btn-primary{background:var(--brand);color:var(--paper);border-color:var(--brand)}

<body>
<div class="container">
<header class="masthead"><div class="brand"><img class="brand-logo" src="assets/logo_gladia_un_colore.svg" onerror="this.src='assets/logo_gladia_un_colore.png'" alt="GLADIA"><div><div class="brand-name">GLADIA</div><div class="brand-sub">HPC Console · Leonardo</div></div></div><div class="masthead-right"><div class="date-line" id="date-line">—</div><button class="refresh-btn" onclick="fetchData()">↻ Refresh</button></div></header>
<div class="sub-bar"><span>Compute usage across active ISCRA allocations</span><span id="last-refresh">—</span></div>
<div id="banner"></div>
<div id="doomsday-container"></div>
<div class="stats" id="stats"></div>
<div class="tabs-bar"><div class="tabs"><button class="tab active" data-view="projects" onclick="setView('projects')">Projects <span class="tab-count" id="ct-projects">0</span></button><button class="tab" data-view="members" onclick="setView('members')">Members <span class="tab-count" id="ct-members">0</span></button><button class="tab" data-view="fun" onclick="setView('fun')">Stats</button><button class="tab" data-view="guide" onclick="setView('guide')">Guide</button></div><div class="toolbar" id="toolbar"><label class="filter-toggle" id="filter-wrap"><input type="checkbox" id="filter-active" onchange="S.filterActive=this.checked;render()"> Only active</label><label>Sort</label><select id="sort-select" onchange="onSort()"></select></div></div>
<div id="content"><div class="loading">Fetching the latest reports…</div></div>
<footer class="page-footer"><span>GLADIA · Sapienza University of Rome, by Alessandro Zirilli & Davide Marincione</span><span><a href="https://gladia.di.uniroma1.it" target="_blank">gladia.di.uniroma1.it</a> · <a href="https://github.com/alexzilligmm/gladia-dashboard" target="_blank">source</a></span></footer>
</div>
<template id="guide-template">
  <div style="margin-top:20px">
    <section class="guide-section">
      <div class="guide-title">Getting started on Leonardo</div>
      <div class="guide-sub">SLURM · Cineca · the short version</div>
      <div class="guide-prose">
        <p>Leonardo uses <strong>SLURM</strong> to schedule jobs across its GPU nodes. You submit a job, as a <code>sbatch</code> script (fire &amp; forget) or an <code>salloc</code> interactive allocation, and SLURM queues it until resources are free. The conventions below are the GLADIA defaults: they won't win awards, but they keep jobs cheap and scripts reproducible.</p>
        <p>Skip straight to the <strong>template generator</strong> below if you just need a <code>.slurm</code> file.</p>
      </div>
    </section>

    <section class="guide-section">
      <div class="guide-title">Best practices</div>
      <div class="guide-sub">The stuff Davide keeps telling people on Discord</div>
      <div class="tips-grid">
        <div class="tip"><div class="tip-head">Python envs</div><div class="tip-body">Use <code>uv</code> for fast, reproducible venvs. Stay on CUDA ≤ 12.6 to match the node modules.</div></div>
        <div class="tip"><div class="tip-head">Training code</div><div class="tip-body">Prefer Lightning with <code>ddp</code>, <code>bf16-mixed</code>, and <code>sync_batchnorm: true</code>. Set <code>num_nodes = ceil(#gpus / 4)</code>.</div></div>
        <div class="tip"><div class="tip-head">Use srun</div><div class="tip-body">Always launch your program with <code>srun python main.py</code>, even inside <code>sbatch</code>, so SLURM maps one task per GPU correctly.</div></div>
        <div class="tip"><div class="tip-head">No internet on nodes</div><div class="tip-body">Compute nodes can't reach the web. Pre-download datasets, weights, and wheels from a login node first.</div></div>
        <div class="tip"><div class="tip-head">Don't leak salloc</div><div class="tip-body">Interactive allocations bill until you <code>exit</code>. Check <code>squeue --me</code> before closing your laptop.</div></div>
        <div class="tip"><div class="tip-head">No brute-force sweeps</div><div class="tip-body">Avoid 0.001 resolution grid searches. Brute forcing parameters is very expensive even only in terms of overhead. </div></div>
      </div>
    </section>

    <section class="guide-section">
      <div class="guide-title">Software environment</div>
      <div class="guide-sub">Modules to load at the top of every job</div>
      <div class="guide-prose">
        <p>Every SLURM script should begin by loading Leonardo's module stack. Two combinations cover almost every use case, pick the one that matches the kind of code you're running.</p>
        <p><strong>Generic CUDA stack.</strong> Plain CUDA toolkit plus the NVHPC compilers. Use this when you build your own environment from scratch (for example, a <code>uv</code> venv with your own wheels).</p>
      </div>
      <div class="formula">module load profile/deeplrn<br>module load cuda nvhpc</div>
      <div class="guide-prose">
        <p><strong>Cineca-AI stack.</strong> Cineca's curated AI image, with <code>torch</code>, <code>transformers</code>, and, critically, a pre-built <code>flash-attn</code> already in place. This saves you the painful flash-attn compile and is the fastest path to a working baseline.</p>
      </div>
      <div class="formula">module load profile/deeplrn<br>module load cineca-ai</div>
    </section>

    <section class="guide-section">
      <div class="guide-title">Where to put your data</div>
      <div class="guide-sub">Storage scopes · pick the right one</div>
      <div class="guide-prose">
        <p>Consider that each storage type induces <strong>different overheads on each job that interacts with it!</strong>. This really impacts wasted compute over large, with short jobs sweeps.</p>
      </div>
      <table class="storage-table">
        <thead><tr><th>Path</th><th>Scope</th><th>Quota</th><th>Use for</th></tr></thead>
        <tbody>
          <tr><td><code>$HOME</code></td><td>Permanent · personal</td><td class="col-quota">50 GB</td><td>Configs, small code, dotfiles</td></tr>
          <tr><td><code>$WORK</code></td><td>Permanent · per project</td><td class="col-quota">1 TB</td><td>Shared project data &amp; code</td></tr>
          <tr><td><code>$FAST</code></td><td>Permanent · per project</td><td class="col-quota">1 TB</td><td>Hot data — fastest IO tier</td></tr>
          <tr><td><code>$SCRATCH</code></td><td>Temporary (40 d) · personal</td><td class="col-quota">—</td><td>Checkpoints, intermediate outputs</td></tr>
          <tr><td><code>$TMPDIR</code></td><td>Temporary · per job</td><td class="col-quota">—</td><td>Job-local scratch (wiped at end)</td></tr>
          <tr><td><code>$PUBLIC</code></td><td>Permanent · personal · world-readable</td><td class="col-quota">50 GB</td><td>Sharing with other users</td></tr>
        </tbody>
      </table>
    </section>

    <section class="guide-section">
      <div class="guide-title">How billing works</div>
      <div class="guide-sub">Why the defaults are what they are</div>
      <div class="guide-prose">
        <p>Cineca bills the <em>most-used</em> resource on each node, proportionally to the whole node. Asking for 1 GPU without matching CPU/RAM is billed the same as claiming the whole node, so there's no reason to under-allocate.</p>
      </div>
      <div class="formula">R = max<sub>r</sub> ( Allocated(r) / Total(r) )&nbsp;&nbsp;→&nbsp;&nbsp;Billed hours = 32 · R · elapsed · nodes</div>
      <div class="guide-prose">
        <p>A Leonardo Booster node has <strong>4 GPUs · 32 CPUs · 512 GB RAM</strong>. The sweet spot per GPU is therefore <strong>8 CPUs and 128 GB RAM</strong>, that's the ratio the generator below enforces.</p>
      </div>
    </section>

    <section class="guide-section">
      <div class="guide-title">SLURM template generator</div>
      <div class="guide-sub">Fill in the blanks · copy or download the script</div>
      <div class="gen-grid">
        <div class="gen-form">
          <div class="form-row">
            <label class="form-label" for="tpl-name">Job name</label>
            <input id="tpl-name" class="form-input" type="text" value="my-job" oninput="updateTpl()">
          </div>
          <div class="form-row">
            <label class="form-label" for="tpl-account">Account · Project ID</label>
            <input id="tpl-account" class="form-input" type="text" value="" list="tpl-projects-list" oninput="updateTpl()">
            <datalist id="tpl-projects-list"></datalist>
            <span class="form-help">Tab-completes from projects currently tracked on the dashboard.</span>
          </div>
          <div class="form-grid-2">
            <div class="form-row">
              <label class="form-label" for="tpl-gpus">GPUs</label>
              <select id="tpl-gpus" class="form-input" onchange="updateTpl()">
                <option value="1" selected>1 GPU</option>
                <option value="2">2 GPUs</option>
                <option value="3">3 GPUs</option>
                <option value="4">4 GPUs · 1 full node</option>
                <option value="8">8 GPUs · 2 nodes</option>
                <option value="16">16 GPUs · 4 nodes</option>
                <option value="32">32 GPUs · 8 nodes</option>
              </select>
            </div>
            <div class="form-row">
              <label class="form-label" for="tpl-time">Wall time</label>
              <input id="tpl-time" class="form-input" type="text" value="24:00:00" pattern="\d{1,3}:\d{2}:\d{2}" oninput="updateTpl()">
              <span class="form-help">HH:MM:SS · up to 96 h on lprod.</span>
            </div>
          </div>
          <div class="form-row">
            <label class="form-label" for="tpl-qos">Quality of Service</label>
            <select id="tpl-qos" class="form-input" onchange="updateTpl()">
              <option value="normal" selected>Normal · up to 24 h</option>
              <option value="dbg">Debug · 30 min · max 8 GPUs</option>
              <option value="bprod">Big (bprod) · at least 65 nodes</option>
              <option value="lprod">Long (lprod) · up to 96 h</option>
            </select>
            <span class="form-help">Normal omits the --qos line entirely.</span>
          </div>
          <div id="tpl-summary" class="resource-summary"></div>
        </div>
        <div>
          <pre id="tpl-preview" class="tpl-preview"></pre>
          <div class="tpl-actions">
            <button class="tpl-btn tpl-btn-primary" onclick="downloadTpl()">↓ Download .slurm</button>
            <button class="tpl-btn" onclick="copyTpl(this)">Copy to clipboard</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</template>
<script src="assets/doomsday-clock.js"></script>
<script src="assets/usage-history-chart.js"></script>
<script src="assets/slurm_creator.js"></script>
<script>
function E(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
const GIST_DESC_PREFIX="gladia-hpc-status-",MANUAL_GIST_SOURCES=["https://gist.github.com/Davide-F5-Marincione/b917fb214fb459ae61383c650d551c8f"],UC=["#2a5a8a","#5a7f3e","#b47628","#822235","#4a6d5c","#9c7a2c","#6e4e7d","#34656d","#8b6f47","#4d5d73","#7b4d62","#5d7c7a"];
// Browser-edit toggle for alert QA: set to true to force the red-alert banner.
const TEST_FORCE_RED_ALERT=false;
// Browser-edit toggle for midnight-mode QA: set to true to force IT IS MIDNIGHT + theme flip.
const TEST_FORCE_MIDNIGHT=false;
function uc(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))|0;return UC[Math.abs(h)%UC.length]}
let S={users:[],projects:[],view:"projects",sort:"status",msort:"consumed",filterActive:false,expanded:{}};
function pH(s){if(s===null||s===undefined||s==="")return 0;if(typeof s==="number")return s;const p=String(s).split(":");return parseFloat(p[0]||0)+parseFloat(p[1]||0)/60+parseFloat(p[2]||0)/3600}
function fH(h){if(h>=1e5)return(h/1e3).toFixed(0)+"k";if(h>=1e3)return(h/1e3).toFixed(1)+"k";return Math.round(h).toLocaleString()}
function fI(n){return Number(n).toLocaleString()}
function tA(ts){const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/6e4);if(m<1)return"just now";if(m<60)return m+"m ago";const h=Math.floor(m/60);return h<24?h+"h ago":Math.floor(h/24)+"d ago"}
function pD(s){return new Date(s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8))}
function dB(d){return Math.ceil((d-Date.now())/864e5)}
function fM(s){return pD(s).toLocaleDateString("en-US",{month:"short",year:"numeric"})}
function pS(b){const days=dB(pD(b.end)),o=b.percent>=100;if(days<0)return{k:"expired",l:`ended ${-days}d ago`,c:"chip-expired"};if(o)return{k:"over",l:`${days}d · over quota`,c:"chip-over"};if(days<30)return{k:"ending",l:`${days}d left`,c:"chip-ending"};return{k:"active",l:`${days}d left`,c:"chip-active"}}
function pC(p){return p>=100?"var(--bad)":p>=90?"var(--warn)":"var(--ink)"}

async function fetchData(){
document.getElementById("content").innerHTML='<div class="loading">Fetching the latest reports…</div>';document.getElementById("banner").innerHTML="";
let u=[];try{u=await fG();
if(!u.length)document.getElementById("banner").innerHTML='<div class="banner">No public Gist reports found yet — waiting for members to log into Leonardo and upload.</div>';
}catch(e){document.getElementById("banner").innerHTML=`<div class="banner">Could not reach the archive: ${E(e.message)}</div>`}
S.users=u;S.projects=bP(u);const now=new Date();
document.getElementById("date-line").textContent=now.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"}).toUpperCase();
document.getElementById("last-refresh").textContent=`Refreshed ${now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}`;updateSortOpts();render()}

function pTS(ts){const v=Date.parse(ts||"");return Number.isFinite(v)?v:0}
function sUD(ms){const d=new Date(ms);return Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate())}
function yMS(s){if(!s||String(s).length!==8)return NaN;return Date.UTC(Number(s.slice(0,4)),Number(s.slice(4,6))-1,Number(s.slice(6,8)))}
function nU(u){
  const daily=(Array.isArray(u.usage)?u.usage:[]).filter(x=>x&&x.date&&x.account);
  u.usage_daily=daily.map(x=>({date:x.date,account:x.account,consumed:pH(x.consumed),num_jobs:Number(x.num_jobs)||0}));
  const totals=[];
  if(Array.isArray(u.usage_totals)&&u.usage_totals.length){
    u.usage_totals.forEach(x=>{if(!x?.account)return;totals.push({account:x.account,consumed:pH(x.consumed),num_jobs:Number(x.num_jobs)||0})});
  }else{
    const m={};
    (u.usage||[]).forEach(x=>{if(!x?.account)return;const y=m[x.account]||(m[x.account]={account:x.account,consumed:0,num_jobs:0});y.consumed+=pH(x.consumed);y.num_jobs+=(Number(x.num_jobs)||0)});
    Object.values(m).forEach(x=>totals.push(x));
  }
  u.usage=totals;

  if(u.usage_grand_total&&u.usage_grand_total.consumed!==undefined){
    u.total_consumed=pH(u.usage_grand_total.consumed);
    u.total_jobs=Number(u.usage_grand_total.num_jobs)||0;
  }else{
    u.total_consumed=totals.reduce((s,x)=>s+pH(x.consumed),0);
    u.total_jobs=totals.reduce((s,x)=>s+(Number(x.num_jobs)||0),0);
  }
  return u
}
function fDay(s){if(!s||String(s).length!==8)return"?";return`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`}
function gId(source){const s=String(source||"").trim();if(!s)return"";const m=s.match(/([a-f0-9]{20,40})$/i);return m?m[1]:""}

async function fG(){
  const manualIds=MANUAL_GIST_SOURCES.map(gId).filter(Boolean);
  const gists=[];
  for(let page=1;page<=3;page++){
    const gl=await fetch(`https://api.github.com/gists/public?per_page=100&page=${page}`);
    if(!gl.ok)throw new Error(`GitHub API ${gl.status}`);
    const chunk=await gl.json();
    gists.push(...chunk);
    if(chunk.length<100)break;
  }
  const byId={};
  gists.forEach(g=>{if(g?.id)byId[g.id]=g});
  await Promise.all(manualIds.map(async id=>{
    if(byId[id])return;
    try{
      const r=await fetch(`https://api.github.com/gists/${id}`);
      if(r.ok){
        const g=await r.json();
        if(g?.id)byId[g.id]=g;
      }
    }catch{}
  }));
  const cand=Object.values(byId).filter(g=>manualIds.includes(g.id)||String(g.description||"").startsWith(GIST_DESC_PREFIX));
  const loadedNested=await Promise.all(cand.map(async g=>{
    const jsonFiles=Object.values(g.files||{}).filter(f=>f?.filename?.endsWith(".json")&&f?.raw_url);
    if(!jsonFiles.length)return [];
    const rows=await Promise.all(jsonFiles.map(async jf=>{
      try{
        const data=await fetch(jf.raw_url).then(r=>r.json());
        if(!data||!data.user)return null;
        data.__updated_at=g.updated_at||g.created_at||data.timestamp;
        return nU(data);
      }catch{return null}
    }));
    return rows.filter(Boolean);
  }));
  const loaded=loadedNested.flat();
  const byUser={};
  loaded.filter(Boolean).forEach(u=>{const k=u.user,ts=pTS(u.__updated_at||u.timestamp);if(!byUser[k]||ts>pTS(byUser[k].__updated_at||byUser[k].timestamp))byUser[k]=u});
  return Object.values(byUser);
}

function bP(users){
  const pm={},pi={};
  users.forEach(u=>{const upd=u.__updated_at||u.timestamp||null,ts=pTS(upd);(u.budgets||[]).forEach(b=>{if(!b?.account)return;const cur=pm[b.account];if(!cur||ts>cur.__ts){pm[b.account]={...b,percent:Number.isFinite(Number(b.percent))?Number(b.percent):((Number(b.total)||0)>0?((Number(b.consumed)||0)/(Number(b.total)||1))*100:0),latest_update:upd,latest_update_ts:ts,__ts:ts}}});(u.pi_of||[]).forEach(acc=>{if(!pi[acc]||ts>pi[acc].ts)pi[acc]={user:u.user,ts}})});
  Object.values(pm).forEach(p=>{const mm={};users.forEach(u=>{const x=(u.usage||[]).find(z=>z.account===p.account);if(!x)return;mm[u.user]={user:u.user,account:p.account,consumed:x.consumed,num_jobs:x.num_jobs||0}});p.members=Object.values(mm);p.pi=pi[p.account]?.user||null});
  return Object.values(pm).map(({__ts,...rest})=>rest);
}

function aB(){return S.projects||[]}
function setView(v){S.view=v;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===v));updateSortOpts();render()}
function updateSortOpts(){const sel=document.getElementById("sort-select"),tb=document.getElementById("toolbar"),fw=document.getElementById("filter-wrap"),v=S.view;
if(v==="fun"||v==="guide"){tb.style.display="none";return}
tb.style.display="flex";fw.style.display=v==="projects"?"flex":"none";
const opts=v==="projects"?[["status","Status"],["expiry","Expiry (soonest)"],["availability","Availability (h left)"],["percent-asc","% Used ↑"],["percent-desc","% Used ↓"],["name","Name"]]:[["consumed","Consumed ↓"],["consumed-asc","Consumed ↑"],["jobs","Jobs ↓"],["name","Name"]];sel.innerHTML=opts.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join("");const cur=v==="projects"?S.sort:S.msort;if(opts.some(o=>o[0]===cur))sel.value=cur;else{sel.value=opts[0][0];if(v==="projects")S.sort=opts[0][0];else S.msort=opts[0][0]}}
function sortM(ws){switch(S.msort){case"consumed-asc":return ws.sort((a,b)=>a.tk-b.tk);case"jobs":return ws.sort((a,b)=>b.tj-a.tj);case"name":return ws.sort((a,b)=>a.u.user.localeCompare(b.u.user));default:return ws.sort((a,b)=>b.tk-a.tk)}}
function onSort(){const v=document.getElementById("sort-select").value;if(S.view==="projects")S.sort=v;else S.msort=v;render()}
function tE(k){S.expanded[k]=!S.expanded[k];render()}

function gC(acc){const pr=S.projects.find(p=>p.account===acc);if(pr?.members?.length)return{cs:pr.members.map(m=>({user:m.user,hours:pH(m.consumed),jobs:m.num_jobs})),pi:pr.pi,partial:false};
const l=[];S.users.forEach(u=>{const x=(u.usage||[]).find(x=>x.account===acc);if(x)l.push({user:u.user,hours:pH(x.consumed),jobs:x.num_jobs})});
let pi=null;for(const u of S.users)if((u.pi_of||[]).includes(acc)){pi=u.user;break}return{cs:l,pi,partial:true}}

function sortB(bs){const so={active:0,ending:1,over:2,expired:3};switch(S.sort){
case"expiry":return bs.sort((a,b)=>dB(pD(a.end))-dB(pD(b.end)));
case"availability":return bs.sort((a,b)=>(b.total-b.consumed)-(a.total-a.consumed));
case"percent-asc":return bs.sort((a,b)=>a.percent-b.percent);
case"percent-desc":return bs.sort((a,b)=>b.percent-a.percent);
case"name":return bs.sort((a,b)=>a.account.localeCompare(b.account));
default:return bs.sort((a,b)=>{const sa=pS(a),sb=pS(b);return so[sa.k]!==so[sb.k]?so[sa.k]-so[sb.k]:b.percent-a.percent})}}

function render(){const all=aB(),act=all.filter(b=>pS(b).k!=="expired").length,ov=all.filter(b=>b.percent>=100&&dB(pD(b.end))>=0).length,run=S.users.reduce((s,u)=>s+(u.jobs?.filter(j=>j.state==="RUNNING").length||0),0),tot=all.reduce((s,b)=>s+b.consumed,0);
// Render Doomsday Clock if applicable
const ddi = typeof window.computeDoomsdayAlertInfo === "function" ? window.computeDoomsdayAlertInfo(all,S.users) : {doomsdayDate:(typeof window.computeDoomsdayDate === "function" ? window.computeDoomsdayDate(all,S.users) : null),midnightAlert:false,redAlert:false,iscraSafetyDate:null,iscraAcceptanceDate:null};
if(TEST_FORCE_RED_ALERT){ddi.redAlert=true;ddi.iscraAcceptanceDate=ddi.iscraAcceptanceDate||new Date(Date.now()+45*864e5);ddi.iscraSafetyDate=ddi.iscraSafetyDate||new Date(Date.now()+75*864e5)}
if(TEST_FORCE_MIDNIGHT){ddi.midnightAlert=true;ddi.iscraAcceptanceDate=ddi.iscraAcceptanceDate||new Date(Date.now()+45*864e5)}
const dd = ddi.doomsdayDate;
document.body.classList.toggle("midnight-theme",!!ddi.midnightAlert);
const ddBanner = dd ? `<div class="banner" style="border-left-color:var(--bad);background:rgba(130,34,53,.04);border-color:rgba(130,34,53,.2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-top:0;margin-bottom:20px;"><div><div style="color:var(--bad);font-weight:600;font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;display:flex;align-items:center;gap:6px"><span style="font-size:14px">⏳</span> Doomsday Clock</div><div style="font-size:12px;color:var(--ink-muted)">Estimated depletion of all remaining HPC allocations across the lab.</div></div><div style="text-align:right"><div style="font-family:'EB Garamond',Georgia,serif;font-size:24px;color:var(--ink);font-weight:500;line-height:1">${dd.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--bad);text-transform:uppercase;letter-spacing:.05em;margin-top:4px">${Math.max(0,Math.ceil((dd.getTime()-Date.now())/864e5))} days left</div></div></div>` : '';
const midnightBanner = ddi.midnightAlert ? `<div class="banner" style="border-left-color:var(--bad);background:rgba(130,34,53,.18);border-color:rgba(130,34,53,.45);margin-top:0;margin-bottom:20px;"><div style="color:var(--bad);font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">IT IS MIDNIGHT</div><div style="font-size:12px;color:var(--ink-soft)">Projected depletion is before the next ISCRA-C acceptance date. Next acceptance: <span class="mono">${ddi.iscraAcceptanceDate?ddi.iscraAcceptanceDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"n/a"}</span>.</div></div>` : '';
const alertBanner = (!ddi.midnightAlert && ddi.redAlert) ? `<div class="banner" style="border-left-color:var(--bad);background:rgba(130,34,53,.12);border-color:rgba(130,34,53,.35);margin-top:0;margin-bottom:20px;"><div style="color:var(--bad);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">RED ALERT · ISCRA-C WINDOW RISK</div><div style="font-size:12px;color:var(--ink-soft)">Projected depletion precedes the safe replenishment window (next ISCRA-C acceptance + 30 days). Next acceptance: <span class="mono">${ddi.iscraAcceptanceDate?ddi.iscraAcceptanceDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"n/a"}</span>. Safety threshold: <span class="mono">${ddi.iscraSafetyDate?ddi.iscraSafetyDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"n/a"}</span>.</div></div>` : '';
document.getElementById("doomsday-container").innerHTML = ddBanner + midnightBanner + alertBanner;
document.getElementById("stats").innerHTML=`<div class="stat"><div class="stat-label">Projects</div><div class="stat-value tnum">${act}</div><div class="stat-sub">of ${all.length} · ${ov} over</div></div><div class="stat"><div class="stat-label">Members</div><div class="stat-value tnum">${S.users.length}</div><div class="stat-sub">reporting</div></div><div class="stat"><div class="stat-label">Running</div><div class="stat-value tnum" style="color:${run>0?'var(--good)':'var(--ink-muted)'}">${run}</div><div class="stat-sub">jobs on cluster</div></div><div class="stat"><div class="stat-label">Consumed</div><div class="stat-value tnum">${fH(tot)}</div><div class="stat-sub">core-hours</div></div>`;
document.getElementById("ct-projects").textContent=all.length;document.getElementById("ct-members").textContent=S.users.length;
document.getElementById("content").innerHTML=S.view==="projects"?rP():S.view==="members"?rM():S.view==="guide"?rG():rF()}

function rP(){let bs=sortB([...aB()]);if(S.filterActive)bs=bs.filter(b=>{const k=pS(b).k;return k==="active"||k==="ending"});if(!bs.length)return'<div class="loading">No projects match.</div>';return`<div style="margin-top:20px">${bs.map(rPC).join("")}</div>`}

function rPC(b){const{cs,pi,partial}=gC(b.account);cs.sort((a,c)=>c.hours-a.hours);const st=pS(b),tp=b.percent,rem=Math.max(0,b.total-b.consumed);
let run=0;const segs=cs.filter(c=>c.hours>.1).map(c=>{const w=Math.min((c.hours/b.total)*100,100-run);run+=w;return{...c,wp:w}});
const ks=cs.reduce((s,c)=>s+c.hours,0),uh=Math.max(0,b.consumed-ks),uw=Math.min((uh/b.total)*100,Math.max(0,100-run)),oq=tp>100?Math.min(tp-100,20):0;
const exp=S.expanded[`p-${b.account}`],show=exp?cs:cs.slice(0,5);
return`<article class="project-card"><div class="p-header"><div class="p-title"><span class="p-name">${E(b.account.replace(/^Iscr[CB]_/,""))}</span><span class="p-fullname">${E(b.account)}</span></div><span class="p-percent tnum" style="color:${pC(tp)}">${tp.toFixed(1)}<span style="font-size:18px">%</span></span></div>
<div class="p-meta">${pi?`<span class="p-meta-item"><span class="p-meta-label">PI</span><span class="p-meta-value">${E(pi)}</span></span>`:""}<span class="p-meta-item"><span class="p-meta-label">Period</span><span class="p-meta-value">${fM(b.start)} → ${fM(b.end)}</span></span><span class="p-meta-item"><span class="chip ${st.c}">${st.l}</span></span><span class="p-meta-item" style="margin-left:auto"><span class="p-meta-label">Remaining</span><span class="p-meta-value">${fI(rem)} h</span></span><span class="p-meta-item"><span class="p-meta-label">Quota</span><span class="p-meta-value">${fI(b.total)} h</span></span></div>
<div class="seg-bar">${segs.map(s=>`<div class="seg" style="width:${s.wp}%;background:${uc(s.user)}" title="${E(s.user)}: ${fH(s.hours)} h"></div>`).join("")}${uw>0?`<div class="seg seg-unreported" style="width:${uw}%" title="Unreported: ${fH(uh)} h"></div>`:""}${oq>0?`<div class="seg seg-over" style="width:${oq}%"></div>`:""}</div>
<div class="bar-footer"><span>${fI(b.consumed)} / ${fI(b.total)} h</span><span>${rem>0?fI(rem)+" h remaining":Math.abs(b.total-b.consumed).toLocaleString()+" h over"}</span></div>
${cs.length>0?`<div class="contributors"><div class="contrib-hed"><span>Contributors · ${cs.length}</span>${partial?`<span class="contrib-partial">partial</span>`:""}</div>${show.map((c,i)=>`<div class="contrib-row"><span class="contrib-rank">${i+1}</span><span class="contrib-swatch" style="background:${uc(c.user)}"></span><span class="contrib-name">${E(c.user)}${pi===c.user?'<span class="chip chip-pi">PI</span>':''}</span><span class="contrib-hours tnum">${fH(c.hours)} h</span><span class="contrib-jobs tnum">${fI(c.jobs)} jobs</span></div>`).join("")}${cs.length>5?`<button class="expand-toggle" onclick="tE('p-${E(b.account)}')">${exp?"Show top 5":`Show all ${cs.length}`}</button>`:""}</div>`:`<div class="contributors"><div class="contrib-hed"><span>No contributors reported</span></div></div>`}</article>`}

function rM(){if(!S.users.length)return'<div class="loading">No members yet.</div>';const bm={};S.users.forEach(u=>u.budgets?.forEach(b=>{bm[b.account]=b}));
const ws=S.users.map(u=>{const tk=Number(u.total_consumed)||0,tj=Number(u.total_jobs)||0;let ga=0;(u.pi_of||[]).forEach(a=>{const b=bm[a];if(b)ga+=b.total});return{u,tk,ga,tj}});sortM(ws);
return`<div style="margin-top:20px">${ws.map(rMC).join("")}</div>`}

function rMC({u:user,tk:taken,ga:gathered,tj:totalJobs}){const rj=(user.jobs||[]).filter(j=>j.state==="RUNNING"),isPi=(user.pi_of||[]).length>0,net=gathered-taken,col=uc(user.user);
const prjs=(user.usage||[]).slice().sort((a,b)=>pH(b.consumed)-pH(a.consumed)),mxH=prjs.length>0?pH(prjs[0].consumed):1;
const ej=S.expanded[`j-${user.user}`],allj=(user.jobs||[]),jts=ej?allj.slice(0,10):allj.slice(0,3);
const now=Date.now(),cutoff=sUD(pTS(user.__updated_at||user.timestamp)||now)-864e5,since=cutoff-29*864e5,recent=(user.usage_daily||[]).filter(d=>{const t=yMS(d.date);return Number.isFinite(t)&&t>=since&&t<=cutoff});
const depRate=recent.reduce((s,d)=>s+(Number(d.consumed)||0),0)/30;
const activeAccounts=new Set((user.usage||[]).map(p=>p.account));let rem=0;activeAccounts.forEach(a=>{const b=(S.projects||[]).find(p=>p.account===a);if(!b)return;const k=pS(b).k;if((k==="active"||k==="ending")&&b.total>b.consumed)rem+=b.total-b.consumed});
const depDays=depRate>0&&rem>0?Math.ceil(rem/depRate):null,depEta=depDays?new Date(now+depDays*864e5):null;
return`<article class="member-card"><div class="m-top"><div class="m-name-block"><div class="m-avatar" style="color:${col}">${E(user.user.slice(0,1).toUpperCase())}</div><div><div class="m-name">${E(user.user)} ${isPi?'<span class="chip chip-pi" style="vertical-align:middle;margin-left:6px">PI</span>':''}</div><div class="m-meta">${E(user.hostname||"")} · ${tA(user.timestamp)}</div></div></div>${rj.length>0?`<span class="m-running"><span class="m-running-dot"></span>${rj.length} running</span>`:""}</div>
<div class="m-balance ${isPi?'':'non-pi'}"><div><div class="m-balance-label">Consumed</div><div class="m-balance-value tnum">${fH(taken)}</div><div class="m-balance-sub">core-hours · ${fI(totalJobs)} jobs</div></div>${isPi?`<div><div class="m-balance-label">Gathered</div><div class="m-balance-value tnum" style="color:var(--good)">${fH(gathered)}</div><div class="m-balance-sub">${user.pi_of.length} project${user.pi_of.length>1?'s':''}</div></div><div><div class="m-balance-label">Net</div><div class="m-balance-value tnum" style="color:${net>=0?'var(--good)':'var(--bad)'}">${net>=0?'+':''}${fH(Math.abs(net))}</div><div class="m-balance-sub">gathered − used</div></div>`:`<div><div class="m-balance-label">Projects</div><div class="m-balance-value tnum">${prjs.length}</div><div class="m-balance-sub">contributing to</div></div>`}</div>
<div class="m-depletion"><div class="m-balance-label">Overall Depletion (30d Avg)</div><div class="m-depletion-main tnum">${depRate>0?`${fH(depRate)} h/day`:'n/a'}</div><div class="m-depletion-sub">${depDays&&depEta?`${fI(rem)} h left across active accounts · ETA ${depEta.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`:"insufficient recent data or no active remaining quota"}</div></div>
${rj.length>0?`<div class="jobs-list"><div class="jobs-head"><span>ID</span><span>Name</span><span>State</span><span>Time</span><span>Nodes</span></div>${jts.map(j=>`<div class="job-row"><span style="color:var(--ink-muted)">${E(j.id)}</span><span class="job-name">${E(j.name)}</span><span class="state-pill state-${E(j.state)}"><span class="state-dot"></span>${E(j.state)}</span><span style="color:var(--ink-muted)">${E(j.time)}</span><span style="color:var(--ink-muted)">${E(j.nodes)}</span></div>`).join("")}${allj.length>3?`<button class="expand-toggle" onclick="tE('j-${E(user.user)}')">${ej?"Show top 3":`Show ${Math.min(allj.length,10)} of ${allj.length} jobs`}</button>`:""}</div>`:""}
${prjs.length>0?`<div style="margin-top:16px"><div class="contrib-hed" style="padding-bottom:6px;margin:0 0 8px"><span>Per-project consumption</span><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">${prjs.length}</span></div>${prjs.map(p=>{const h=pH(p.consumed);return`<div class="m-project-row"><div class="m-project-name-wrap"><span class="contrib-swatch" style="background:${col}"></span><span class="m-project-name">${E(p.account.replace(/^Iscr[CB]_/,""))}</span>${(user.pi_of||[]).includes(p.account)?'<span class="chip chip-pi">PI</span>':''}</div><span class="contrib-hours tnum">${fH(h)} h</span><span class="contrib-jobs tnum">${fI(p.num_jobs)} jobs</span><div class="m-project-bar"><div class="m-project-bar-fill" style="width:${(h/mxH)*100}%;background:${col}"></div></div></div>`}).join("")}</div>`:""}</article>`}

/* ============  GUIDE TAB  ============ */
function rG(){
  const known=[...new Set((S.projects||[]).map(p=>p.account).concat((S.users||[]).flatMap(u=>(u.budgets||[]).map(b=>b.account))))].filter(Boolean);
  const activeAccs=new Set((S.projects||[]).filter(p=>{try{return pS(p).k!=="expired"}catch{return true}}).map(p=>p.account));
  known.sort((a,b)=>{
    const aA=activeAccs.has(a),bA=activeAccs.has(b);
    if(aA!==bA)return aA?-1:1;
    const priA=a.startsWith("IscrC_")?0:a.startsWith("IscrB_")?1:2;
    const priB=b.startsWith("IscrC_")?0:b.startsWith("IscrB_")?1:2;
    if(priA!==priB)return priA-priB;
    return a.localeCompare(b);
  });
  const defAcc=known[0]||"IscrC_XXXX";
  const tpl=document.getElementById("guide-template");
  const wrapper=document.createElement("div");
  wrapper.appendChild(tpl.content.cloneNode(true));
  const acct=wrapper.querySelector("#tpl-account");
  if(acct)acct.setAttribute("value",defAcc);
  const dl=wrapper.querySelector("#tpl-projects-list");
  if(dl)dl.innerHTML=known.map(p=>`<option value="${E(p)}">`).join("");
  return wrapper.innerHTML;
}

/* ============  FUN STATS TAB  ============ */
function gatherStats(){return S.users.map(u=>{const tk=Number(u.total_consumed)||0,tj=Number(u.total_jobs)||0;return{name:u.user,hours:tk,jobs:tj,hpj:tj>0?tk/tj:Infinity,col:uc(u.user)}})}
function medal(i){return i===0?"🥇":i===1?"🥈":i===2?"🥉":null}
function lbHTML(title,sub,rows,valFmt){const top=rows.slice(0,5),mx=top.length?Math.max(...top.map(r=>r.val)):1;
return`<div class="lb-section"><div class="lb-title">${title}</div><div class="lb-sub">${sub}</div>${top.map((r,i)=>{const m=medal(i);return`<div class="lb-row"><span class="${m?'lb-medal':'lb-rank'}">${m||i+1}</span><span class="contrib-swatch" style="background:${r.col}"></span><span class="lb-name">${E(r.name)}</span><span class="lb-val">${valFmt(r.val)}</span><div class="lb-bar-wrap"><div class="lb-bar-fill" style="width:${(r.val/mx)*100}%;background:${r.col}"></div></div></div>`}).join("")}</div>`}
function seedRng(str){let s=0;for(let i=0;i<str.length;i++)s=((s<<5)-s+str.charCodeAt(i))|0;return function(){s=s^(s<<13);s=s^(s>>17);s=s^(s<<5);return(s>>>0)/4294967296}}

function rF(){
if(!S.users.length)return'<div class="loading">No stats yet — need some members first.</div>';
const st=gatherStats();
const byJobs=[...st].sort((a,b)=>b.jobs-a.jobs);
const byHours=[...st].sort((a,b)=>b.hours-a.hours);
const bySpeed=[...st].filter(u=>u.jobs>0).sort((a,b)=>a.hpj-b.hpj);
const bySnorlax=[...st].filter(u=>u.jobs>0).sort((a,b)=>b.hpj-a.hpj);
const dailyPeaks=S.users.map(u=>{const d=(u.usage_daily||[]).slice().sort((a,b)=>b.consumed-a.consumed)[0];return d?{name:`${u.user} · ${fDay(d.date)}`,val:d.consumed,col:uc(u.user)}:null}).filter(Boolean).sort((a,b)=>b.val-a.val);
let html='<div style="margin-top:20px">';
html+=lbHTML("Job Machine","who has submitted the most jobs",byJobs.map(u=>({name:u.name,val:u.jobs,col:u.col})),v=>fI(v)+" jobs");
html+=lbHTML("Speed Demon","lowest hours per job — the burst masters",bySpeed.map(u=>({name:u.name,val:u.hpj,col:u.col})),v=>v.toFixed(2)+" h/job");
html+=lbHTML("Hour Devourer","total core-hours consumed across all projects",byHours.map(u=>({name:u.name,val:u.hours,col:u.col})),v=>fH(v)+" h");
html+=lbHTML("Snorlax Award","highest hours per job — masters of long naps",bySnorlax.map(u=>({name:u.name,val:u.hpj,col:u.col})),v=>v.toFixed(2)+" h/job");
html+=lbHTML("Pyromaniac","largest single-day core-hour spike",dailyPeaks,v=>fH(v)+" h");
html+=`<div class="lb-section"><div class="lb-title">Usage History</div><div class="lb-sub">Interactive real usage history (last 100 days or 100 weeks)</div>
<div class="svd-card"><div class="chart-head"><span class="lb-sub" style="margin:0">window</span><select id="usage-history-mode"><option value="daily">Daily · last 100 days</option><option value="weekly">Weekly · last 100 weeks</option></select></div><div class="chart-scroll"><canvas id="usage-history-canvas" height="220"></canvas></div>
<div class="svd-legend">${st.map(u=>`<span class="svd-legend-item"><span class="svd-legend-dot" style="background:${u.col}"></span>${E(u.name)}</span>`).join("")}</div></div></div>`;
html+=`<div class="lb-section"><div class="lb-title">SVD Mentions Per Day</div><div class="lb-sub">Totally real metric tracked by our monitoring infrastructure</div>
<div class="svd-card"><canvas id="svd-canvas" height="220"></canvas>
<div class="svd-legend">${st.map(u=>`<span class="svd-legend-item"><span class="svd-legend-dot" style="background:${u.col}"></span>${E(u.name)}</span>`).join("")}</div></div></div>`;
html+='</div>';return html}

function drawSVD(){
const cv=document.getElementById("svd-canvas");if(!cv)return;
const dpr=window.devicePixelRatio||1;const rect=cv.getBoundingClientRect();
cv.width=rect.width*dpr;cv.height=220*dpr;
const ctx=cv.getContext("2d");ctx.scale(dpr,dpr);
const W=rect.width,H=220,pad={t:16,b:28,l:40,r:16};
const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
const days=30,st=gatherStats();
ctx.strokeStyle="#c0b9a8";ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
ctx.fillStyle="#8a8478";ctx.font="9px 'JetBrains Mono',monospace";ctx.textAlign="right";
for(let i=0;i<=4;i++){const y=pad.t+ph*(1-i/4);ctx.fillText(Math.round(i*25/4*4),pad.l-6,y+3);
if(i>0){ctx.save();ctx.strokeStyle="#ebe3ce";ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.restore()}}
ctx.textAlign="center";
for(let d=0;d<days;d+=5){const x=pad.l+pw*(d/(days-1));ctx.fillText("d"+(d+1),x,H-pad.b+14)}
st.forEach(u=>{
const rng=seedRng(u.name+"svd2026");
const pts=[];let base=8+rng()*14;
for(let d=0;d<days;d++){base+=((rng()-.5)*4);base=Math.max(1,Math.min(24,base));
const v=base+Math.sin(d*0.7+rng()*6)*3+Math.sin(d*0.3+rng()*4)*2+(rng()-.5)*1.5;
pts.push(Math.max(0.5,Math.min(25,v)))}
ctx.strokeStyle=u.col;ctx.lineWidth=2.2;ctx.lineJoin="round";ctx.beginPath();
pts.forEach((v,i)=>{const x=pad.l+pw*(i/(days-1)),y=pad.t+ph*(1-v/25);
if(i===0)ctx.moveTo(x,y);else{const px=pad.l+pw*((i-1)/(days-1)),py=pad.t+ph*(1-pts[i-1]/25);
const cx1=px+(x-px)*.4,cx2=x-(x-px)*.4;ctx.bezierCurveTo(cx1,py,cx2,y,x,y)}});
ctx.stroke()})}

new MutationObserver(()=>{if(S.view==="fun")requestAnimationFrame(()=>{if(typeof window.initUsageHistoryChart==="function")window.initUsageHistoryChart(S.users);drawSVD()});if(S.view==="guide")requestAnimationFrame(updateTpl)}).observe(document.getElementById("content"),{childList:true});
fetchData();
</script>
</body>
</html>
